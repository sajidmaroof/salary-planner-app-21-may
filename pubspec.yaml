name: salary_planner
description: A new Flutter project for Salary-to-Salary Planner.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  go_router: ^13.2.0
  intl: ^0.19.0
  fl_chart: ^0.66.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  share_plus: ^7.2.2
  pdf: ^3.10.8
  cupertino_icons: ^1.0.6
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.4.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1
  sign_in_with_apple: ^6.1.2
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/animations/images/
    - assets/icons/
